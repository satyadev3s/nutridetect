services:
  - type: web
    name: nutridetect
    runtime: python
    rootDir: nutriscan
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
